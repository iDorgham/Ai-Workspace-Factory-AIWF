# AIWF v7.0.0 — Enhanced Command System
# Library Component: 12-meta-engine/meta-orchestration/v7-orchestration/command-system.yaml
# Version: 7.0.0 | Reasoning Hash: sha256:commands-v7-2026-04-23
# Rollback: .ai/commands/ (v6 command files preserved)
# ============================================================

schema_version: "7.0.0"
registry_id: "cmd-system-v7"
description: >
  Full machine-readable specification of the AIWF v7.0.0 enhanced command system.
  Consumed by Factory Scaffolder when composing new workspaces, and by
  Hot-Sync Protocol when updating managed workspaces.

global_flags:
  - flag: "--dry-run"
    description: "Simulate the command without writing files or making real changes."
  - flag: "--simple"
    description: "Minimal output mode — suppress structural details."
  - flag: "--validate"
    description: "Run validation gates only, do not proceed to execution."
  - flag: "--trace"
    description: "Verbose tracing of all agent decisions and routing."
  - flag: "--auto-fix"
    description: "Allow Healing Bot v2 to apply safe auto-remediations."
  - flag: "--silent"
    description: "Suppress all non-essential output. Show only result/URL/status."
  - flag: "--phase=N"
    description: "Target a specific implementation phase number."
  - flag: "--region=egypt|redsea|mena"
    description: "Activate Regional Adapter for MENA-specific adaptations."
  - flag: "--auto-merge"
    description: "Enable conditional auto-merge after all gates pass."
  - flag: "--verbose"
    description: "Maximum output detail for debugging."

commands:

  do:
    id: "CMD-001"
    syntax: '/do "idea or description" [flags]'
    agent: "Master Guide → Spec Architect"
    description: "Transform a raw idea into a structured PRD."
    steps:
      - "Parse idea: extract domain, goal, users, constraints"
      - "Clarify with ≤3 targeted questions if ambiguous"
      - "Auto-detect regional relevance and suggest adaptations"
      - "Generate 00-prd/prd.md with REQ-IDs and acceptance criteria"
      - "Generate 00-prd/requirements-trace.json trace skeleton"
      - "Suggest /plan as next step"
    outputs:
      - "plan/00-prd/prd.md"
      - "plan/00-prd/requirements-trace.json"
    flags:
      - "--region=egypt|redsea|mena"
      - "--from=existing-prd.md"
      - "--dry-run"
      - "--validate"

  plan:
    id: "CMD-002"
    syntax: "/plan [--from=path1,path2|dir/] [flags]"
    agent: "Spec Architect + Contract Guardian + Regional Adapter"
    description: "Generate complete AIWF SDD workspace from one or more PRDs (Multi-PRD Synthesis)."
    prerequisite: "At least one PRD must exist in plan/00-prd/ or specified path"
    steps:
      - "Read and synthesize multiple PRDs if provided"
      - "Resolve requirement conflicts and de-duplicate REQ-IDs"
      - "Merge synthesized requirements into unified spec.md and spec.yaml"
      - "Produce design.md with Mermaid architecture"
      - "Generate db-schema.sql and db-erd.md"
      - "Build tasks.json with dependency graph across all synthesized REQs"
      - "Create contracts/ (api-contract.yaml, state-contract.json, test-fixtures/)"
      - "Populate regional/ folder if --region active"
      - "Run all validation gates"
      - "Write _manifest.yaml"
    validation_gates:
      - "spec-lint: 100%"
      - "contract-check: 100%"
      - "trace-matrix: 100% (traceable to all source PRDs)"
      - "regional-compliance: 100% (if --region active)"
    outputs:
      - "plan/_manifest.yaml"
      - "plan/01-<slug>/spec.md"
      - "plan/01-<slug>/spec.yaml"
      - "plan/01-<slug>/design.md"
      - "plan/01-<slug>/db-schema.sql"
      - "plan/01-<slug>/db-erd.md"
      - "plan/01-<slug>/tasks.json"
      - "plan/01-<slug>/contracts/"
      - "plan/01-<slug>/regional/"
      - "plan/01-<slug>/validation/"
    flags:
      - "--from=file1,file2 (comma-separated synthesis)"
      - "--from=dir/ (synthesize all PRDs in directory)"
      - "--phase=N"
      - "--region=egypt|redsea|mena"
      - "--validate-only"
      - "--dry-run"
      - "--auto-merge"

  dev:
    id: "CMD-003"
    syntax: "/dev [--phase=N] [--task=ID]"
    agent: "Regional Adapter + Master Guide"
    description: "Execute implementation tasks. Focuses by default on the FIRST uncompleted phase in tasks.json."
    steps:
      - "Read tasks.json and identify first 'pending' phase"
      - "Activate sovereign developer swarm for the targeted task"
      - "Execute code changes with append-only auditability"
      - "Apply MENA regional adaptations if --region active"
      - "Auto-update tasks.json upon completion"
    outputs:
      - "Code mutations in workspaces/<slug>/"
      - "Updated tasks.json"
    flags:
      - "--phase=N (target specific phase)"
      - "--task=ID (target specific task ID)"
      - "--region=egypt|redsea|mena"

  guide:
    id: "CMD-004"
    syntax: "/guide"
    agent: "Master Guide"
    description: "Interactive instructor mode. Provides recap, learning, and next steps based on current phase progress."
    steps:
      - "Read tasks.json and project manifest"
      - "Generate '✅ Done' educational recap of last completed task"
      - "Generate '📚 Learn' pedagogical explanation of used patterns"
      - "Generate '▶️ Next' prioritized commands for the current phase"
    outputs:
      - "Standardized Guide response block"

  test:
    id: "CMD-005"
    syntax: "/test --phase=N [flags]"
    agent: "Contract Guardian + Regional Adapter (if --region)"
    description: "Execute unit, integration, contract, stress, and regional compliance tests."
    outputs:
      - "plan/01-<slug>/validation/contract-coverage.json"
    auto_merge_gate: "≥100% contract coverage required"
    flags:
      - "--phase=N"
      - "--stress (chaos injection)"
      - "--region=egypt|redsea|mena"

  fix:
    id: "CMD-006"
    syntax: "/fix [target] [flags]"
    agent: "Healing Bot v2 + Spec Architect"
    description: "Diagnose failures, map to spec.yaml ACs, propose patches."
    steps:
      - "Identify failing component"
      - "Map failure to spec.yaml acceptance criteria"
      - "Propose targeted patch or --spec-sync realignment"
      - "Invoke Healing Bot v2 for structural remediation"
      - "Log to .ai/logs/healing-bot.md"
    subcommands:
      - "/fix last — fix the most recent failure"
      - "/fix contracts — re-validate all contracts"
      - "/fix --auto-fix — let Healing Bot v2 apply safe patches"
      - "/fix --spec-sync — realign implementation with spec"
    flags:
      - "--auto-fix"
      - "--spec-sync"

  db:
    id: "CMD-007"
    syntax: "/db [flags]"
    agent: "Spec Architect + Regional Adapter (if --region)"
    description: "Design schema, generate migrations, seeds, ERD."
    outputs:
      - "plan/01-<slug>/db-schema.sql"
      - "plan/01-<slug>/db-erd.md"
    regional_note: "Applies Law 151/2020 data residency rules when --region=egypt"
    flags:
      - "--phase=N"
      - "--dry-run"
      - "--region=egypt|redsea|mena"

  git:
    id: "CMD-008"
    syntax: "/git [subcommand] [flags]"
    agent: "Master Guide (silent automation)"
    description: "Full control over Git operations and automation toggles."
    subcommands:
      - "/git status"
      - "/git commit -m 'message'"
      - "/git push"
      - "/git auto on|off — toggle silent automation"
      - "/git merge-auto on|off — toggle conditional auto-merge"
    log: ".ai/logs/github_auto.log"

  deploy:
    id: "CMD-009"
    syntax: "/deploy [flags]"
    agent: "Deployment Specialist"
    description: "Deploy to Vercel. EXPLICIT ONLY — never auto-triggered."
    critical_constraint: "NEVER triggered by git push, merge, or any automation. ONLY runs when user explicitly invokes /deploy."
    steps:
      - "Check Vercel CLI (vercel --version)"
      - "Link project if needed (vercel link --yes)"
      - "Pull env vars (vercel pull --environment=preview|production)"
      - "Build and deploy (vercel deploy or vercel deploy --prod)"
      - "Output deployment URL and build summary"
      - "Log to .ai/logs/deployments.log with Reasoning Hash"
    subcommands:
      - "/deploy --prod --silent"
      - "/deploy --preview"
      - "/deploy status"
      - "/deploy --dry-run"
    flags:
      - "--prod"
      - "--preview"
      - "--env=KEY=VALUE"
      - "--dry-run"
      - "--silent"
      - "--confirm"
      - "--region=egypt|redsea|mena"

  brainstorm:
    id: "CMD-010"
    syntax: "/brainstorm [flags]"
    agent: "Master Guide + Recursive Engine"
    description: "Proactive ideation, spec enhancement, regional adaptation."
    auto_trigger:
      probability: "15-20%"
      condition: "Regional context or compliance gaps detected during active dev"
    output_format:
      - "Clear title/objective"
      - "Minimal spec.yaml or tasks.json snippet (copyable)"
      - "Regional fit explanation"
      - "Omega Gate considerations"
      - "Next steps with exact commands"
    copyable_blocks: true
    flags:
      - "--skill=name"
      - "--spec=phase-slug"
      - "--region=egypt|redsea|mena"
      - "--idea"
      - "--proactive"

  guide_protocol:
    id: "CMD-011"
    syntax: "Automatic — appended to EVERY response"
    agent: "Master Guide"
    description: "Persistent instructor mode. MANDATORY on every response."
    format: |
      Guide:
      ✅ Done: [Brief educational recap]
      📚 Learn: [Plain-language teaching of key concept]
      ▶️ Next: [1-3 prioritized next actions]
      💡 Suggest: [Optional proactive brainstorm, ~15-20% trigger]

  scrape:
    id: "CMD-012"
    syntax: "/scrape [url] [flags]"
    agent: "Scrape Specialist"
    description: "Autonomous data extraction for blogs, product catalogs, or research."
    steps:
      - "Fetch URL and bypass anti-bot headers"
      - "Parse DOM and extract structured fields (JSON/Markdown)"
      - "Clean data and validate against Law 151/2020 privacy rules"
    outputs:
      - "docs/planning/scraped_{date}.json"
    flags:
      - "--output=path"
      - "--format=json|markdown"
      - "--limit=N"

  content:
    id: "CMD-013"
    syntax: "/content [type] --topic='X' [flags]"
    agent: "Content Architect"
    description: "Generate SEO-optimized copy for blogs, SaaS, or e-commerce."
    steps:
      - "Analyze topic and PRD REQ-IDs"
      - "Research context (via scrape if needed)"
      - "Generate copy with RTL/MENA awareness"
      - "Apply SEO metadata and keywords"
    outputs:
      - "docs/planning/{date}_{slug}_content.md"
    flags:
      - "--topic=string (required)"
      - "--type=blog|product|doc|social"
      - "--region=egypt|redsea|mena"

  art:
    id: "CMD-014"
    syntax: "/art 'prompt' [flags]"
    agent: "Spec Architect → Asset Guardian"
    description: "Generates UI assets, logos, and illustrations with accessibility check."
    steps:
      - "Generate prompt based on project style.css/tailwind.config"
      - "Trigger Generative Art Pipeline (DALL-E/Midjourney)"
      - "Post-gate: Asset Guardian validates color contrast (WCAG 2.1)"
      - "Auto-provision into public/assets/"
    outputs:
      - "public/assets/{type}/{date}_{slug}.webp"
    flags:
      - "--style=midjourney|dalle"
      - "--variations=N"
      - "--region=redsea|egypt|mena"

  deck:
    id: "CMD-015"
    syntax: "/deck --topic='X' [flags]"
    agent: "Content Architect"
    description: "Generate professional investor or product presentation decks."
    steps:
      - "Synthesize data from docs/ plans and architecture"
      - "Generate slide-by-slide structure"
      - "Format as PDF/PPTX with brand consistency"
    outputs:
      - "docs/00-guides/{date}_presentation-deck.pdf"
    flags:
      - "--slides=N"
      - "--template=investor|product|technical"

  life:
    id: "CMD-016"
    syntax: "/life [subcommand] [flags]"
    agent: "Master Guide"
    description: "Personal planning and priority management engine."
    subcommands:
      - "/life daily — sync calendar and tasks for today"
      - "/life weekly — 7-day priority overview"
      - "/life roadmap — align personal goals with project milestones"
    outputs:
      - "docs/00-guides/{date}_priority-list.md"
    flags:
      - "--mode=daily|weekly|roadmap"
      - "--sync-external"

  dashboard:
    id: "CMD-017"
    syntax: "/dashboard"
    agent: "T0 Master Guide"
    description: "Launches the Omega TUI Command Center for multi-workspace visibility."
    steps:
      - "Aggregate status from all workspaces"
      - "Stream real-time logs via WebSocket relay"
      - "Display health scores and orchestration versions"
    outputs:
      - "Interactive TUI session"

  swarm:
    id: "CMD-018"
    syntax: "/swarm '<command>' [--group=name]"
    agent: "T0 Swarm Router"
    description: "Execute a command across multiple workspaces in parallel."
    steps:
      - "Identify target workspace group"
      - "Distribute task via ThreadPoolExecutor"
      - "Aggregate outputs and duration metrics"
    flags:
      - "--group=name (filter by workspace folder)"
      - "--workers=N (parallel thread count)"

  saas:
    id: "CMD-019"
    syntax: "/saas init [name] [flags]"
    agent: "T2 Factory Scaffolder + T1 Spec Architect"
    description: "Provisions a full SaaS stack (Auth, DB, Billing, Dashboards) in 60s."
    steps:
      - "Pull pre-certified components from factory/library/18-saas-boilerplate/"
      - "Auto-config Next.js, Prisma, and NextAuth"
      - "Inject Stripe/Fawry billing shims"
      - "Generate initial UI assets via /art"
    flags:
      - "--region=egypt|redsea|mena"
      - "--db=postgres|mongodb"

  harvest:
    id: "CMD-020"
    syntax: "/harvest [url] --topic='X' [flags]"
    agent: "T1 Scrape Specialist + T1 Content Architect"
    description: "Orchestrated Scraping + Content generation to populate a workspace."
    steps:
      - "Scrape raw data from target URL"
      - "Synthesize data into SEO-optimized content"
      - "Provision 5+ items directly to workspace docs/planning/"
    flags:
      - "--count=N (items to generate)"
      - "--region=egypt|redsea|mena"

  network:
    id: "CMD-021"
    syntax: "/network [subcommand] [flags]"
    agent: "T0 Root Orchestrator + Swarm Router"
    description: "Manage P2P Global Swarm connectivity and sharded memory."
    subcommands:
      - "/network join — connect to the AIWF P2P fabric"
      - "/network status — view connected peers and sharded memory health"
      - "/network sync — fetch optimized library components from the network"
    steps:
      - "Initialize P2P Node (factory/core/p2p_node.py)"
      - "Discover peers via Discovery Engine"
      - "Establish encrypted handshake"
      - "Verify peer reputation and consensus"
    flags:
      - "--port=N (custom listening port)"
      - "--private (disable mDNS discovery)"

  omega:
    id: "CMD-022"
    syntax: "/omega [subcommand] [args] [flags]"
    agent: "Omega Core (T0) + Recursive Engine"
    description: "Execute high-autonomy singularity operations: self-refactoring and intent-to-saas."
    subcommands:
      - "/omega audit — run recursive factory health audit"
      - "/omega evolve — apply autonomous logic refactors"
      - "/omega generate <intent> — zero-interface Intent-to-SaaS flow"
    steps:
      - "Identify intent/signal"
      - "Generate SDD & Scaffolding (SaaS Architect)"
      - "Execute Harvest & Synthesis (Harvest Engine)"
      - "Apply Asset Guardian quality gate"
      - "Execute final deployment audit"
    flags:
      - "--region=egypt|redsea|mena"
      - "--force (bypass Omega Gate v10 approval)"
  deploy:
    id: "CMD-023"
    syntax: "/deploy [shard_id] [flags]"
    agent: "Deployment Specialist (T1) + Cloud-Gateway"
    description: "Automated distribution of factory shards to remote cloud infrastructure."
    steps:
      - "Validate shard connectivity via Cloud-Gateway"
      - "Push industrial manifest to Shadow-Runner"
      - "Execute remote /sync equilibrium check"
    flags:
      - "--provider=aws|hetzner|vercel|do"
      - "--region=egypt|mena|global"
      - "--mode=full|delta"

