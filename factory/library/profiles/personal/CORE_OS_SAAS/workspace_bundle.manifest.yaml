# Allowlist for a trimmed CORE_OS_SAAS workspace (.ai/ scope).
# template_id matches factory/shards/CORE_OS_SAAS basename.
template_id: CORE_OS_SAAS
summary: "Turborepo / Next SaaS — spec, contracts, CI, security, deploy discipline."
canonical_source: factory/library

agents:
  - Master Guide
  - Spec Architect
  - Contract Guardian
  - CI Specialist
  - Security Auditor
  - Integrity Auditor
  - Deployment Specialist
  - Factory Scaffolder
  - Profile Auditor
  - Healing Bot v2

skills:
  - guide_sdd_mastery
  - guide_teaching
  - engineering_documentation
  - official_vercel_use_ai_sdk
  - design_design_system
  - design_accessibility
  - official_github_github_issues

commands:
  - /plan blueprint
  - /plan status
  - /dev init
  - /dev implement
  - /dev test
  - /dev fix
  - /audit health
  - /audit security
  - /git auto
  - /mat
  - /guide
  - /help

notes:
  - "Vercel promotion stays policy-gated: use explicit /deploy where your workspace defines it; do not auto-deploy."

# Paths are repo-root relative. Copy/sync into workspace `.ai/` via industrial_mirror_sync or your shard importer.
library:
  agents_registry_yaml: factory/library/agents/workspace_imports/ai/agents/registry/registry.yaml
  subagents_registry_json: factory/library/subagents/registry.json
  subagent_ids:
    - blueprint-architect
    - quality-checker
    - approval-gate
  commands_merged_md: factory/library/commands/commands.md
  commands_registry_yaml: factory/library/commands/registry.yaml
  commands_support_md:
