# 🛰️ API CONTRACT: Omega Dashboard WebSocket Relay
# Phase: 2 | Status: DRAFT

endpoint: "ws://localhost:9001/relay"
protocol: "v1.json"

messages:
  - type: "LOG_STREAM"
    direction: "server -> client"
    payload:
      workspace: "string"
      level: "INFO | WARN | ERROR"
      message: "string"
      timestamp: "ISO-8601"

  - type: "HEALTH_PING"
    direction: "client -> server"
    payload:
      node_id: "string"
      uptime_s: "number"

  - type: "SWARM_EXEC"
    direction: "client -> server"
    payload:
      command: "string"
      target_group: "string | null"
