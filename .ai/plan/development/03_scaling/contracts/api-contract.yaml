endpoint: "http://localhost:8000/v1"
auth: "Bearer Token"

methods:
  - name: "execute_command"
    params:
      command: "string"
      args: "array"
      workspace: "string"
    returns:
      job_id: "string"
      status: "queued | running"

  - name: "get_job_status"
    params:
      job_id: "string"
    returns:
      status: "completed | failed"
      output: "string"
      error: "string | null"

  - name: "scaffold_saas"
    params:
      project_name: "string"
      region: "egypt | redsea | mena"
      features: "array"
