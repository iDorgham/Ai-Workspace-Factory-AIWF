<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWF Industrial Dashboard v3.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            AIWF v6.0
        </div>
        <nav>
            <div class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Overview
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                Workspaces
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Governance
            </div>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h1>Industrial Control Center</h1>
            <div id="session-status" style="color: var(--success)">● System Online</div>
        </div>

        <!-- Health Widget -->
        <div class="card health-widget">
            <div class="health-gauge" id="health-score">17.3</div>
            <h3>Library Health</h3>
            <p style="color: var(--text-secondary)">Industrial Readiness Index</p>
        </div>

        <!-- Topology Widget -->
        <div class="card topology-widget">
            <h3>Sovereign Topology</h3>
            <div id="topology-list" style="margin-top: 1rem">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Ledger Widget -->
        <div class="card ledger-widget">
            <h3>Omega Gate Ledger</h3>
            <table class="ledger-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Reasoning Hash</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ledger-body">
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
