name: Docs Health

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate workspace index/status
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/factory/library/01-software-engineering/developing/scripts
          python3 factory/library/01-software-engineering/developing/scripts/workspace_health.py

      - name: Run docs quality gate
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/factory/library/01-software-engineering/developing/scripts
          python3 factory/library/01-software-engineering/developing/scripts/docs_quality_gate.py
