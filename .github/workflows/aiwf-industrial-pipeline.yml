name: 🏗️ AIWF Industrial Pipeline (v21.0.0)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-audit:
    name: 🛡️ Industrial Health Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Health Scorer
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 factory/scripts/maintenance/health_scorer.py
      - name: Archive Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: health-audit-report
          path: .ai/logs/health-audit-report.md

  sovereign-verification:
    name: 🔒 Sovereign Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify Provisioning Engine
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Use modern v10 scaffolder
          python3 factory/scripts/automation/saas_scaffolder.py "CI-Test-Project"
          # Check for .ai/metadata.json
          if [ ! -f "workspaces/clients/ci-test-project/metadata.json" ]; then
            echo "❌ Sovereign structure failed!"
            exit 1
          fi
      - name: Spec Density Gate — All Active Plan Phases
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          echo "🔍 Running spec_density_gate_v2 on plan phases (density enforced only when phase.spec.json status is declared)..."
          FAILED=0
          PASSED=0
          WARNED=0

          # PRD §4.4 + v21: tripartite phases use `phase-*` (content/seo/…); development uses `NN_slug/` under .ai/plan/development/
          phase_dirs=$(
            find .ai/plan -mindepth 2 -maxdepth 2 -type d -name "phase-*" 2>/dev/null
            find .ai/plan/development -mindepth 1 -maxdepth 1 -type d 2>/dev/null
          )

          # Policy — warn-only (never fail job): draft | planned | unknown
          #   - unknown: missing phase.spec.json OR JSON parse error OR key missing → do not block CI on density drift
          # Policy — enforce (fail job on gate exit ≠ 0): any other status (e.g. pending, active, completed, absorbed)
          for phase_dir in $phase_dirs; do
            # Read phase status from phase.spec.json
            spec_file="$phase_dir/phase.spec.json"
            if [ -f "$spec_file" ]; then
              status=$(python3 -c "import json,sys; d=json.load(open('$spec_file')); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
            else
              status="unknown"
            fi

            # Command substitution inherits bash -e: a failing gate must not abort the loop before we read $?
            set +e
            result=$(python3 factory/scripts/core/spec_density_gate_v2.py --phase "$phase_dir" 2>&1)
            exit_code=$?
            set -e

            phase_name=$(basename "$phase_dir")
            parent_type=$(basename $(dirname "$phase_dir"))

            if [ "$status" = "draft" ] || [ "$status" = "planned" ] || [ "$status" = "unknown" ]; then
              # Warn-only bucket — never block (scaffold-in-progress, not yet committed to enforcement)
              if [ $exit_code -ne 0 ]; then
                echo "⚠️  WARN  [$parent_type/$phase_name] status=$status — density gate did not pass (non-blocking)"
                WARNED=$((WARNED + 1))
              else
                echo "✅ PASS  [$parent_type/$phase_name] status=$status"
                PASSED=$((PASSED + 1))
              fi
            else
              # Enforced: declared non-draft status → density failure blocks CI
              if [ $exit_code -ne 0 ]; then
                echo "❌ FAIL  [$parent_type/$phase_name] status=$status — density gate BLOCKED"
                # grep may find no lines; with bash -e that must not abort the step before FAILED is incremented
                echo "$result" | grep -E "Missing:|Gates:" | head -5 || true
                FAILED=$((FAILED + 1))
              else
                echo "✅ PASS  [$parent_type/$phase_name] status=$status"
                PASSED=$((PASSED + 1))
              fi
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Density Gate Summary: PASS=$PASSED  WARN=$WARNED  FAIL=$FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED enforced-status phase(s) failed the density gate. Commit blocked."
            exit 1
          fi
          echo "✅ All enforced-status phases passed the density gate."

  chaos-regression:
    name: ⚡ Chaos Stress-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Chaos Validator (Dry-Run)
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Create a dummy workspace for testing
          python3 factory/scripts/automation/saas_scaffolder.py "Chaos-Test"
          # Run validator (if script exists in scripts/ or factory/scripts/)
          if [ -f "factory/scripts/maintenance/chaos_validator.py" ]; then
            python3 factory/scripts/maintenance/chaos_validator.py --target "workspaces/clients/chaos-test" --mode all
          else
            echo "⚠️ Chaos Validator not found, skipping..."
          fi

  planning-mirror-sync:
    name: 🔄 Planning Mirror Sync
    runs-on: ubuntu-latest
    needs: [sovereign-verification]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Sync .ai/plan/ → factory/library/planning/
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 factory/scripts/core/planning_mirror_sync.py
      - name: Upload Sync Manifest
        uses: actions/upload-artifact@v4
        with:
          name: planning-sync-manifest
          path: factory/library/planning/sync_manifest.json

  auto-recovery:
    name: 🦾 Sovereign Auto-Recovery
    needs: [health-audit, sovereign-verification, chaos-regression, planning-mirror-sync]
    if: failure()
    uses: ./.github/workflows/self_heal.yml
    with:
      job_name: "industrial-pipeline"
      error_code: "AUTO_FAIL"
