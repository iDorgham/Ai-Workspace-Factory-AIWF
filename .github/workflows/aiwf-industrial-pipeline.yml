name: 🏗️ AIWF Industrial Pipeline (v10.1.0)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-audit:
    name: 🛡️ Industrial Health Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Health Scorer
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 factory/scripts/health_scorer.py
      - name: Archive Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: health-audit-report
          path: .ai/logs/health-audit-report.md

  sovereign-verification:
    name: 🔒 Sovereign Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Provisioning Engine
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Use modern v10 scaffolder
          python3 factory/scripts/saas_scaffolder.py "CI-Test-Project"
          # Check for .ai/metadata.json
          if [ ! -f "workspaces/ci-test-project/.ai/metadata.json" ]; then
            echo "❌ Sovereign structure failed!"
            exit 1
          fi

  chaos-regression:
    name: ⚡ Chaos Stress-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Chaos Validator (Dry-Run)
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Create a dummy workspace for testing
          python3 factory/scripts/saas_scaffolder.py "Chaos-Test"
          # Run validator (if script exists in scripts/ or factory/scripts/)
          if [ -f "factory/scripts/chaos_validator.py" ]; then
            python3 factory/scripts/chaos_validator.py --target "workspaces/chaos-test" --mode all
          else
            echo "⚠️ Chaos Validator not found, skipping..."
          fi

  auto-recovery:
    name: 🦾 Sovereign Auto-Recovery
    needs: [health-audit, sovereign-verification, chaos-regression]
    if: failure()
    uses: ./.github/workflows/self_heal.yml
    with:
      job_name: "industrial-pipeline"
      error_code: "AUTO_FAIL"
