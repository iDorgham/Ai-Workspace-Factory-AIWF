name: Industrial Onboarding Pipeline (v5.1.0)

on:
  push:
    paths:
      - 'factory/intake/**.json'
  workflow_dispatch:
    inputs:
      client:
        description: 'Client Slug'
        required: true
      pipeline:
        description: 'Pipeline Alias'
        default: 'sovereign'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install jsonschema # In case we want to use it later

      - name: Execute Sovereign Composition
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CLIENT_NAME="${{ github.event.inputs.client }}"
            PIPELINE="${{ github.event.inputs.pipeline }}"
          else
            # For push triggers, detect the changed JSON file in factory/intake/
            CLIENT_NAME=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep 'factory/intake/' | head -n 1 | xargs basename -s .json || echo "")
            PIPELINE="sovereign"
          fi

          if [ -n "$CLIENT_NAME" ]; then
            echo "🚀 Processing Client: $CLIENT_NAME (Pipeline: $PIPELINE)"
            export PYTHONPATH=$PYTHONPATH:.
            python3 factory/scripts/compose.py "$CLIENT_NAME" --pipeline "$PIPELINE" --verbose
          else
            echo "⚠️ No client detected for onboarding. Skipping."
          fi

      - name: Audit Path Integrity
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/factory/library/12-meta-engine/core/scripts/scripts
          python3 factory/library/12-meta-engine/core/scripts/scripts/audit_path_integrity.py --check-content

      - name: Commit & Push Workspace
        run: |
          if [ -n "$CLIENT_NAME" ]; then
            git config --global user.name "AIWF-Orchestrator"
            git config --global user.email "orchestrator@ai-workspace-factory.local"
            git add workspaces/
            git commit -m "🚀 INDUSTRIAL-ONBOARDING: Created sovereign workspace for $CLIENT_NAME"
            git push origin master
          fi
